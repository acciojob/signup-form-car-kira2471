<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	  <form method="Post">
        <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Name" required>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Email" required>
        <br><br>
        <label for="gender_m">Gender:</label>
        <input type="radio" id="gender_m" name="gender" required>Male
        <input type="radio" id="gender_f" name="gender" required>female
        <br><br>
        <label for="cars">Cars Brands:</label>
        <select name="CarBrands" id="cars" required>
            <option>--Please choose an option--</option>
            <option value="bmw">BMW</option>
            <option value="audi">Audi</option>
            <option value="swift">Swift</option>
        </select>
        <br><br>
        <label for="age">Age:</label>
        <input type="number" id="age" placeholder="Age">
        <br><br>
        <label for="dob">DOB:</label>
        <input type="date" required>
        <br><br>
        <label for="tel">Phone Number:</label>
        <input type="tel" id="tel" placeholder="xxx-xxx-xxxx">
        <br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Password" required>
        <br><br>
        <label for="tos">I agree to the TOS</label>
        <input type="checkbox" id="tos" required>
        <br><br>
        <input type="submit" value="Submit">
    </form>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
